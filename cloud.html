<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Files to OpenFile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: left; /* Align content to the left */
            transition: background-color 0.3s, color 0.3s; /* Smooth transition for dark mode */
        }
        input[type="file"], input[type="text"] {
            margin: 10px 0;
            padding: 5px;
        }
        button {
            margin: 5px 0;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 5px 0;
        }
        #refreshButton {
            display: inline-block;
            margin-left: 10px;
        }
        #refreshSpinner {
            display: none;
            margin-left: 10px;
        }
        #controlsContainer {
            display: none; /* Hide all controls initially */
        }
        #notificationContainer {
            position: fixed;
            right: 20px;
            top: 20px;
            width: 300px;
            max-height: 90vh;
            overflow-y: auto;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .notification {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }
        .notification button {
            margin-right: 5px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: #777;
        }
        #darkModeButton {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.225);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        #darkModeButton:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }
        .dark-mode {
            background-color: #121212;
            color: #ffffff;
        }
        .dark-mode #notificationContainer {
            background-color: #333;
            border-color: #555;
        }
        .dark-mode .notification {
            background-color: #444;
            border-color: #666;
        }
        .dark-mode footer {
            color: #bbb;
        }
        #dropZone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        #dropZone.dragover {
            background-color: #f0f0f0;
        }
    </style>
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "p1l8zvsu64");
</script>
</head>
<body>
    <h1>Open File (Open-source File Upload, access System)</h1>

    <div id="roleSelection">
        <button id="adminButton">Admin</button>
        <button id="clientButton">Client</button>
        <button id="liveChatButton">Join Live Chat</button>
        <button id="generateEncryptedTokenButton">Generate Encrypted Token</button>
    </div>
    <p style="font-size: small;">open AI tools</p>
    <button id="openChatGptButton" onclick="window.open('https://chatgpt.com/')">ChatGPT</button>
    <button id="openCopilotButton" onclick="window.open('https://copilot.microsoft.com/')">Copilot</button>


    <div id="controlsContainer"> <!-- Wrap everything in this container -->
        <div id="adminControls" style="display: none;">
            <h2>Select File to Upload</h2>
            <input type="file" id="fileInput" accept=".txt, .csv, .pdf, .ppt, .doc, .docx, .dotx, .pptx, .xlsx, .xls, .html, .css, .js, .json, .xml, .py, .java, .c, .cpp, .rb, .go, image/*, video/*" />
            <input type="text" id="newFileName" placeholder="Enter new file name (optional)" />
            <button id="uploadButton">Upload</button>
            <div id="dropZone">Drag and drop files here to upload</div>
            <button id="renameButton">Rename File</button>
            <button id="ownerButton">Owner</button>
            <button id="deleteButton" style="display: none;">Delete File</button>
        </div>

        <h2>Files in Repository:</h2>
        <input type="text" id="searchBar" placeholder="Search files..." />
        <button id="refreshButton">Refresh Files</button>
        <img id="refreshSpinner" src="spinner.gif" alt="Refreshing" style="display: none;">
        <ul id="fileList"></ul>
    </div>

    <div id="notificationContainer">
        <p><strong>Notifications</strong></p>
    </div>

    <button id="darkModeButton">Dark/Light Mode</button>

    <script>
        const adminButton = document.getElementById('adminButton');
        const clientButton = document.getElementById('clientButton');
        const uploadButton = document.getElementById('uploadButton');
        const refreshButton = document.getElementById('refreshButton');
        const refreshSpinner = document.getElementById('refreshSpinner');
        const fileInput = document.getElementById('fileInput');
        const newFileNameInput = document.getElementById('newFileName');
        const fileList = document.getElementById('fileList');
        const adminControls = document.getElementById('adminControls');
        const controlsContainer = document.getElementById('controlsContainer'); // Reference to the controls container
        const searchBar = document.getElementById('searchBar');
        const notificationContainer = document.getElementById('notificationContainer');
        const darkModeButton = document.getElementById('darkModeButton');
        const dropZone = document.getElementById('dropZone');
        const liveChatButton = document.getElementById('liveChatButton');
        const renameButton = document.getElementById('renameButton');
        const ownerButton = document.getElementById('ownerButton');
        const deleteButton = document.getElementById('deleteButton');
        const repoOwner = 'rutujdhodapkar'; // Your GitHub username
        const repoName = 'Storage'; // Your repository name
        // NOTE: Replace this placeholder with your encrypted token string.
        // The token uses a per-letter Caesar cipher shift of +3 to encrypt.
        // To decrypt, shift each letter in the encrypted token by -3.
        // For example, if encrypting: 'abc' with shift 3, you get 'def' - to decrypt, shift 'd' to 'a', etc.
        const encryptedToken = 'amx3a3hlYnNkd2I0NEVFUjlQVFQzPFt3c3NUREhWU2RKYlJJUFRrVWk4WFV4SW1VV3d1a2tdUHhQR29maWpnTlZ1dGxxe1o7dWZ9WE5SW0c3Vk1GUmlPc3pZSWU4';
        const tokenShift = 3; // each letter was shifted +3 when encrypting, decrypt with -3

        // Simple shift + base64 decryption used at runtime in the browser
        function simpleDecrypt(encryptedBase64, shift) {
            try {
                const shifted = atob(encryptedBase64);
                return Array.from(shifted).map(c => String.fromCharCode(c.charCodeAt(0) - shift)).join('');
            } catch (e) {
                console.error('Failed to decrypt token', e);
                return '';
            }
        }

        // Simple encrypt helper (used by the on-page generator) - mirrors the decryption
        function simpleEncrypt(plain, shift) {
            const shifted = Array.from(plain).map(c => String.fromCharCode(c.charCodeAt(0) + shift)).join('');
            return btoa(shifted);
        }

        // Cached decrypted token accessor
        function getToken() {
            if (!window.__decryptedGithubToken) {
                window.__decryptedGithubToken = simpleDecrypt(encryptedToken, tokenShift);
            }
            return window.__decryptedGithubToken || '';
        }
        const passcode = String.fromCharCode(49 + 1, 53 + 1, 48 + 1, 49 + 1, 48 + 1).split('').map(char => String.fromCharCode(char.charCodeAt(0) - 1)).join('');
        let userName = '';
        let generatedOtp = '';

        // Disable all keys and all other things excluding mouse left click and scroll
        document.addEventListener('keydown', (e) => {
            if (e.target !== searchBar && e.target !== newFileNameInput) {
                e.preventDefault(); // Disable all keys except for the search bar and new file name input
            }
        });

        document.addEventListener('contextmenu', (e) => {
            e.preventDefault(); // Disable right-click context menu
        });

        // Event listeners for role selection
        adminButton.addEventListener('click', () => {
            const enteredPasscode = prompt('Enter Admin Passcode:');
            if (enteredPasscode === passcode) {
                adminControls.style.display = 'block'; // Show admin controls
                controlsContainer.style.display = 'block'; // Show controls container
                fetchFiles(); // Fetch the file list
            } else {
                showNotification('Incorrect passcode.');
            }
        });

        clientButton.addEventListener('click', () => {
            controlsContainer.style.display = 'block'; // Show controls container for clients
            fetchFiles(); // Fetch the file list for clients
        });

        // Fetch and display the list of files in the repository
        async function fetchFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`, {
                    headers: {
                        'Authorization': `token ${getToken()}`
                    }
                });

                if (response.ok) {
                    const files = await response.json();
                    renderFileList(files); // Update the UI
                } else {
                    console.error('Error fetching files:', response.statusText);
                }
            } catch (error) {
                console.error('Error fetching files:', error);
            }
        }

        // Render the file list to the UI
        function renderFileList(files) {
            fileList.innerHTML = ''; // Clear the list
            files.forEach(file => {
                const li = document.createElement('li');
                const fileLink = document.createElement('a');

                // Construct the raw URL for the file
                fileLink.href = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/${file.name}`;
                fileLink.textContent = file.name;
                fileLink.target = '_blank'; // Open in a new tab

                // Download file to temporary memory
                fileLink.addEventListener('click', async (e) => {
                    e.preventDefault();
                    try {
                        const response = await fetch(fileLink.href);
                        if (response.ok) {
                            const blob = await response.blob();
                            const url = URL.createObjectURL(blob);
                            const tempLink = document.createElement('a');
                            tempLink.href = url;
                            tempLink.download = file.name;
                            document.body.appendChild(tempLink);
                            tempLink.click();
                            document.body.removeChild(tempLink);
                            URL.revokeObjectURL(url); // Clean up the URL object
                        } else {
                            console.error('Error downloading file:', response.statusText);
                        }
                    } catch (error) {
                        console.error('Error downloading file:', error);
                    }
                });

                li.appendChild(fileLink);
                fileList.appendChild(li);
            });
        }

        // Function to rename a file in the repository
        async function renameFile(oldName, newName) {
            try {
                const getFileResponse = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${oldName}`, {
                    headers: {
                        'Authorization': `token ${getToken()}`
                    }
                });

                if (getFileResponse.ok) {
                    const fileData = await getFileResponse.json();
                    const fileContent = fileData.content;
                    const sha = fileData.sha;

                    const deleteResponse = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${oldName}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `token ${getToken()}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Rename ${oldName} to ${newName}`,
                            sha: sha
                        })
                    });

                    if (deleteResponse.ok) {
                        const createResponse = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${newName}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Rename ${oldName} to ${newName}`,
                                content: fileContent
                            })
                        });

                        if (createResponse.ok) {
                            showNotification('File renamed successfully!');
                            fetchFiles(); // Refresh the file list after renaming
                        } else {
                            const errorData = await createResponse.json();
                            handleError(createResponse.status, errorData);
                        }
                    } else {
                        const errorData = await deleteResponse.json();
                        handleError(deleteResponse.status, errorData);
                    }
                } else {
                    console.error('Error fetching file:', getFileResponse.statusText);
                }
            } catch (error) {
                console.error('Error renaming file:', error);
                showNotification('An error occurred while renaming the file.');
            }
        }

        // Function to delete a file in the repository
        async function deleteFile(fileName) {
            try {
                const getFileResponse = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${fileName}`, {
                    headers: {
                        'Authorization': `token ${getToken()}`
                    }
                });

                if (getFileResponse.ok) {
                    const fileData = await getFileResponse.json();
                    const sha = fileData.sha;

                    const deleteResponse = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${fileName}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Delete ${fileName}`,
                            sha: sha
                        })
                    });

                    if (deleteResponse.ok) {
                        showNotification('File deleted successfully!');
                        fetchFiles(); // Refresh the file list after deletion
                    } else {
                        const errorData = await deleteResponse.json();
                        handleError(deleteResponse.status, errorData);
                    }
                } else {
                    console.error('Error fetching file:', getFileResponse.statusText);
                }
            } catch (error) {
                console.error('Error deleting file:', error);
                showNotification('An error occurred while deleting the file.');
            }
        }

        // Function to generate OTP
        function generateOtp() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        ownerButton.addEventListener('click', () => {
            generatedOtp = atob('MTE3MDk=');
            const enteredOtp = prompt('Enter the OTP:');
            if (enteredOtp === generatedOtp) {
                deleteButton.style.display = 'block'; // Show delete button
            } else {
                showNotification('Incorrect OTP.');
            }
        });

        deleteButton.addEventListener('click', () => {
            const fileName = prompt('Enter the file name to delete:');
            if (fileName) {
                deleteFile(fileName);
            } else {
                showNotification('File name is required.');
            }
        });

        uploadButton.addEventListener('click', async () => {
            const file = fileInput.files[0];
            const newFileName = newFileNameInput.value.trim();

            if (!file) {
                showNotification('Please select a file to upload.');
                return;
            }

            // Check file size (for example, limit to 10MB)
            const maxSizeInMB = 10;
            if (file.size > maxSizeInMB * 1024 * 1024) {
                showNotification(`File size exceeds the limit of ${maxSizeInMB}MB.`);
                return;
            }

            let filePath = file.name;
            if (newFileName) {
                const newFileExtension = newFileName.split('.').pop().toLowerCase();
                const originalFileExtension = file.name.split('.').pop().toLowerCase();

                if (newFileExtension !== originalFileExtension) {
                    showNotification('File extension does not match the original file.');
                    return;
                }

                filePath = newFileName;
            }

            const fileExtension = filePath.split('.').pop().toLowerCase();

            // Use FileReader to read the file
            const reader = new FileReader();
            reader.onload = async () => {
                const fileContent = reader.result.split(',')[1]; // Get base64 content

                try {
                    const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${getToken()}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Upload ${filePath}`,
                            content: fileContent
                        })
                    });

                    if (response.ok) {
                        showNotification('File uploaded successfully!');
                        fetchFiles(); // Refresh the file list after upload
                    } else {
                        const errorData = await response.json();
                        handleError(response.status, errorData);
                    }
                } catch (error) {
                    console.error('Error uploading file:', error);
                    showNotification('An error occurred while uploading the file.');
                }
            };

            reader.onerror = () => {
                console.error('Error reading file:', reader.error);
                showNotification('An error occurred while reading the file.');
            };

            reader.readAsDataURL(file); // Read the file as a data URL
        });

        // Function to check if the file is a coding language format
        function isCodeFile(extension) {
            const codeFileExtensions = ['py', 'js', 'java', 'c', 'cpp', 'rb', 'go', 'html', 'css'];
            return codeFileExtensions.includes(extension);
        }

        // Event listener for refresh button
        refreshButton.addEventListener('click', () => {
            refreshButton.disabled = true; // Disable the button to prevent multiple clicks
            refreshSpinner.style.display = 'inline-block'; // Show the spinner
            fetchFiles().then(() => {
                refreshButton.disabled = false; // Enable the button again
                refreshSpinner.style.display = 'none'; // Hide the spinner
            }); // Fetch the latest files when refresh button is clicked
        });

        // Search functionality
        searchBar.addEventListener('input', () => {
            const query = searchBar.value.toLowerCase();
            const listItems = fileList.getElementsByTagName('li');
            Array.from(listItems).forEach(li => {
                const fileName = li.textContent.toLowerCase();
                li.style.display = fileName.includes(query) ? 'block' : 'none'; // Show/hide based on search
            });
        });

        function handleError(status, errorData) {
            switch (status) {
                case 401:
                    showNotification('Unauthorized: Check your token permissions.');
                    break;
                case 404:
                    showNotification('Repository not found: Check the repository name and owner.');
                    break;
                case 422:
                    showNotification('Unprocessable Entity: Check if the file is too large or invalid.');
                    break;
                default:
                    showNotification('Error uploading file: ' + errorData.message);
            }
            console.error('Error details:', errorData);
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <p>${message}</p>
                <button onclick="this.parentElement.remove()">OK</button>
                <button onclick="this.parentElement.remove()">Cancel</button>
            `;
            notificationContainer.appendChild(notification);
        }

        // Dark mode toggle
        darkModeButton.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        // Drag and drop functionality
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files; // Set the files to the file input
                uploadButton.click(); // Trigger the upload button click
            }
        });

        // Generate encrypted token helper (prompts for a plain token and shows encrypted value)
        const generateEncryptedTokenButton = document.getElementById('generateEncryptedTokenButton');
        if (generateEncryptedTokenButton) {
            generateEncryptedTokenButton.addEventListener('click', () => {
                const plain = prompt('Enter plain GitHub token to encrypt:');
                if (!plain) {
                    showNotification('No token provided.');
                    return;
                }
                const shiftInput = prompt('Enter shift amount (integer)', String(tokenShift));
                const shift = parseInt(shiftInput, 10) || tokenShift;
                const enc = simpleEncrypt(plain, shift);
                try {
                    navigator.clipboard.writeText(enc);
                    alert('Encrypted token copied to clipboard. Paste it into the file as the value of `encryptedToken`.\n\nEncrypted token:\n' + enc + '\n\nShift used: ' + shift);
                    showNotification('Encrypted token copied to clipboard. Paste into file.');
                } catch (e) {
                    alert('Encrypted token:\n' + enc + '\n\nShift used: ' + shift);
                }
            });
        }

        // Event listener for rename button
        renameButton.addEventListener('click', () => {
            const oldName = prompt('Enter the current file name:');
            const newName = prompt('Enter the new file name:');
            if (oldName && newName) {
                const oldFileExtension = oldName.split('.').pop().toLowerCase();
                const newFileExtension = newName.split('.').pop().toLowerCase();

                if (oldFileExtension !== newFileExtension) {
                    showNotification('File extension does not match the original file.');
                    return;
                }

                renameFile(oldName, newName);
            } else {
                showNotification('Both old and new file names are required.');
            }
        });

        // Event listener for live chat button
        liveChatButton.addEventListener('click', () => {
            window.location.href = 'https://realmsgg.vercel.app';
        });
    </script>
    <footer>
        &copy; 2025 All rights reserved.
    </footer>
</body>
</html>
