<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rutuj Dhodapkar</title>
<link rel="icon" href="https://raw.githubusercontent.com/rutujdhodapkar/Profile/main/icons.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    background: #0f0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* frame border */
body::before {
    content: "";
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px;
}

/* main container */
.container {
    width: 90%;
    max-width: 900px;
    height: 80vh;
    display: flex;
    flex-direction: column;
}

/* top card */
.card {
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 24px;
    font-weight: 600;
}

.sub {
    font-size: 14px;
    opacity: 0.6;
    margin-bottom: 15px;
}

/* buttons */
.primary-btn, .nav-btn {
    padding: 10px 16px;
    border-radius: 30px;
    border: 1px solid #000;
    cursor: pointer;
    margin: 5px;
}

.primary-btn {
    background: black;
    color: white;
}

.nav-btn {
    background: transparent;
}

.nav-btn:hover, .primary-btn:hover {
    transform: translateY(-2px);
}

/* iframe viewer */
.viewer {
    flex: 1;
    border: none;
    border-radius: 12px;
    background: white;
}

/* footer */
.footer {
    text-align: center;
    font-size: 12px;
    opacity: 0.5;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h1>Rutuj Dhodapkar</h1>
        <div class="sub">AI/ML Engineer • On-device systems</div>

        <button class="primary-btn" onclick="loadPage('static/frame of index.html')">
            Enter Portfolio →
        </button>

        <div>
            <button class="nav-btn" onclick="loadPage('contact.html')">Contact</button>
            <button class="nav-btn" onclick="loadPage('cloud.html')">Cloud</button>
            <button class="nav-btn" onclick="loadPage('https://openmeg.vercel.app/')">
                Messaging
            </button>
        </div>
    </div>

    <!-- 🔥 THIS is your internal "browser" -->
    <iframe id="frame" class="viewer"></iframe>

    <div class="footer" id="countdown">
        Redirecting in 5...
    </div>

</div>

<script>
const frame = document.getElementById("frame");

function loadPage(page) {
    frame.src = page;
}

// auto load portfolio after 5s
let t = 5;
const el = document.getElementById("countdown");

const timer = setInterval(() => {
    t--;
    el.innerText = "Redirecting in " + t + "...";

    if (t === 0) {
        clearInterval(timer);
        loadPage('static/frame of index.html');
    }
}, 1000);
</script>

</body>
</html>
