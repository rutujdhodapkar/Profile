<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rutuj Dhodapkar</title>
<link rel="icon" href="https://raw.githubusercontent.com/rutujdhodapkar/Profile/main/icons.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    background: #0f0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* border frame */
body::before {
    content: "";
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px;
}

/* landing card */
.card {
    text-align: center;
    padding: 50px 30px;
    max-width: 420px;
    width: 90%;
    z-index: 2;
}

h1 {
    font-size: 26px;
    font-weight: 600;
}

.sub {
    font-size: 14px;
    opacity: 0.6;
    margin-bottom: 30px;
}

/* buttons */
.primary-btn {
    width: 100%;
    padding: 14px;
    border-radius: 40px;
    border: 1px solid #000;
    background: black;
    color: white;
    cursor: pointer;
    margin-bottom: 15px;
}

.nav-btn {
    padding: 8px 14px;
    border-radius: 30px;
    border: 1px solid #000;
    background: transparent;
    cursor: pointer;
    margin: 5px;
}

/* 🔥 FULLSCREEN FRAME */
#frame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    z-index: 10;
}

/* footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="card" id="landing">
    <h1>Rutuj Dhodapkar</h1>
    <div class="sub">AI/ML Engineer • On-device systems</div>

    <button class="primary-btn" onclick="enterSite('static/frame of index.html')">
        Enter Portfolio →
    </button>

    <div>
        <button class="nav-btn" onclick="enterSite('contact.html')">Contact</button>
        <button class="nav-btn" onclick="enterSite('cloud.html')">Cloud</button>
        <button class="nav-btn" onclick="enterSite('https://openmeg.vercel.app/')">
            Messaging
        </button>
    </div>

    <div class="footer" id="countdown">
        Redirecting in 5...
    </div>
</div>

<!-- FULLSCREEN VIEW -->
<iframe id="frame"></iframe>




    <script>
const frame = document.getElementById("frame");
const landing = document.getElementById("landing");

/* ROUTES (controlled, no guessing) */
const routes = {
    "/": null,
    "/portfolio": "static/frame-index.html",
    "/contact": "contact.html",
    "/cloud": "cloud.html",
    "/message": "message.html"
};

/* INITIAL STATE */
history.replaceState({ path: "/" }, "", "/");

/* LOAD PAGE */
function enterSite(path) {
    const page = routes[path];
    if (!page) return;

    frame.src = page;
    frame.style.display = "block";
    landing.style.display = "none";

    history.pushState({ path }, "", path);
}

/* BACK / FORWARD */
window.addEventListener("popstate", (event) => {
    const path = event.state?.path || "/";

    if (path === "/") {
        frame.style.display = "none";
        landing.style.display = "block";
        return;
    }

    const page = routes[path];
    if (page) {
        frame.src = page;
        frame.style.display = "block";
        landing.style.display = "none";
    }
});

/* AUTO ENTRY */
let t = 5;
const el = document.getElementById("countdown");

const timer = setInterval(() => {
    t--;
    el.innerText = "Redirecting in " + t + "...";

    if (t === 0) {
        clearInterval(timer);
        enterSite("/portfolio");
    }
}, 1000);
</script>


    
</body>
</html>
