<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rutuj Dhodapkar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    background: #0f0f0f0f;
    display: flex;
    flex-direction: column;
}

/* top nav */
.nav {
    padding: 15px;
    display: flex;
    gap: 10px;
    justify-content: center;
}

.nav button {
    padding: 8px 14px;
    border: 1px solid #000;
    background: transparent;
    cursor: pointer;
    border-radius: 20px;
}

.nav button:hover {
    background: black;
    color: white;
}

/* content viewer */
#app {
    flex: 1;
    padding: 20px;
    overflow: auto;
}
</style>
</head>

<body>

<div class="nav">
    <button onclick="load('portfolio')">Portfolio</button>
    <button onclick="load('contact')">Contact</button>
    <button onclick="load('cloud')">Cloud</button>
</div>

<div id="app">
    Loading...
</div>

<script>
const routes = {
    portfolio: "static/frame of index.html",
    contact: "contact.html",
    cloud: "cloud.html"
};

async function load(route) {
    const res = await fetch(routes[route]);
    const html = await res.text();
    document.getElementById("app").innerHTML = html;
}

// default load
load("portfolio");
</script>

</body>
</html>
