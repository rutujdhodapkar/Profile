<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutuj Dhodapkar</title>

    <link rel="icon" href="https://raw.githubusercontent.com/rutujdhodapkar/Profile/main/icons.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, sans-serif;
        }

        body {
            height: 100vh;
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .bg {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #6366f1, transparent 60%);
            filter: blur(120px);
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.5;
        }

        .card {
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.05);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 25px;
        }

        .primary-btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            padding: 10px 16px;
            border-radius: 50px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <h1>Hey, this is Rutuj's web 🚀</h1>

    <button class="primary-btn" onclick="goTo('static/frame of index.html')">
        View Portfolio →
    </button>

    <div class="btn-group">
        <button class="nav-btn" onclick="goTo('contact.html')">Contact</button>
        <button class="nav-btn" onclick="goTo('cloud.html')">Cloud</button>
<button class="nav-btn" onclick="window.location.href='https://openmeg.vercel.app/'">
  Messaging
</button>    </div>
</div>

<script>
function goTo(page) {
    // Debug log (optional)
    console.log("Redirecting to:", page);

    // Safe redirect
    window.location.assign(page);
}
</script>

</body>
</html>
