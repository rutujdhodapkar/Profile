    <script>
        // Optimize overlay transitions: only use setTimeouts, don't thrash layout
        window.addEventListener('DOMContentLoaded', function () {
            requestAnimationFrame(function () {
                setTimeout(function () {
                    const overlay = document.getElementById('startup-blur-overlay');
                    if (overlay) {
                        overlay.style.background = 'rgba(255,255,255,0)';
                        overlay.style.backdropFilter = 'blur(0px)';
                        overlay.style.webkitBackdropFilter = 'blur(0px)';
                        setTimeout(function () {
                            overlay.parentNode && overlay.parentNode.removeChild(overlay);
                        }, 1300);
                    }
                }, 100);
            });
        });
    </script>

        // helper: days between (UTC)
        function daysBetween(date1, date2) {
            const dt1 = typeof date1 === "string" ? new Date(date1) : date1;
            const dt2 = typeof date2 === "string" ? new Date(date2) : date2;
            const t1 = Date.UTC(dt1.getUTCFullYear(), dt1.getUTCMonth(), dt1.getUTCDate());
            const t2 = Date.UTC(dt2.getUTCFullYear(), dt2.getUTCMonth(), dt2.getUTCDate());
            return Math.floor((t2 - t1) / 86400000);
        }

        // Custom check for Dec 15 to Jan 15 (inclusive)
        function isNewYearPeriod(date) {
            const year = date.getUTCFullYear();
            const month = date.getUTCMonth(); // 0 = Jan, 11 = Dec
            const day = date.getUTCDate();
            if (month === 11 && day >= 15) {
                // December 15-31
                return true;
            }
            if (month === 0 && day <= 15) {
                // January 1-15
                return true;
            }
            return false;
        }

        // Find a relevant event: today or "within 4 days ahead", favor soonest event in range
        function getUpcomingEvent(events, now) {
            // Show Happy New Year if in the period Dec 15-Jan 15
            if (isNewYearPeriod(now)) {
                return { text: "//Happy new year" };
            }
            let soonest = null, soonestOffset = 99;
            for (const ev of events) {
                const offset = daysBetween(now, ev.date);
                if (offset >= 0 && offset <= 4) {
                    if (offset < soonestOffset) { soonest = ev; soonestOffset = offset; }
                } else if (offset >= -1 && offset <= -0) { // today (should catch as 0 above)
                    soonest = ev; soonestOffset = 0;
                }
            }
            // fallback: nearest future event, if in the future
            if (!soonest) {
                let furthest = null, futOffset = 9999;
                for (const ev of events) {
                    const offset = daysBetween(now, ev.date);
                    if (offset > 0 && offset < futOffset) {
                        furthest = ev; futOffset = offset;
                    }
                }
                return furthest;
            }
            return soonest;
        }

        // Typing effect for the event line (slower typing)
        function typeWrite(toEl, text, speed, callback) {
            toEl.textContent = "";
            let idx = 0;
            function typeNext() {
                if (idx <= text.length) {
                    toEl.textContent = text.substring(0, idx);
                    idx++;
                    if (idx > text.length) {
                        if (callback) callback();
                        return;
                    }
                    setTimeout(typeNext, speed);
                }
            }
            typeNext();
        }

        // New: Animate over upcoming events in order every 2s (after finishing type each)
        document.addEventListener("DOMContentLoaded", function () {
            const tipbox = document.getElementById("calendar-event-tipbox");
            const typedEl = document.getElementById("calendarTypedText");
            const today = new Date();


            // Slower type effect (change speed to 48ms per char for "little slow")
            // Animation for each event, 2 sec after finish typing the line
            const SHOW_DELAY = 2000;  // 2s after finish each line
            const TYPE_SPEED = 48;    // ms per character, a bit slower than 28 (original)

            let eventsToShow = getDisplayEvents(englishCalendarEvents, today);
            let currIdx = 0;

            function showNextEvent() {
                let ev = eventsToShow[currIdx % eventsToShow.length];
                typeWrite(typedEl, ev.text, TYPE_SPEED, function () {
                    setTimeout(() => {
                        currIdx++;
                        showNextEvent();
                    }, SHOW_DELAY);
                });
            }

            showNextEvent();
        });
    </script>
